<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="2048 — slide tiles, merge numbers, reach 2048!">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="2048">
<title>2048</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231a1a2e'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Inter,sans-serif' font-weight='900' font-size='28' fill='url(%23g)'><tspan>2048</tspan></text><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23e94560'/><stop offset='1' stop-color='%23f5a623'/></linearGradient></defs></svg>">

<!-- Inline Web App Manifest -->
<link rel="manifest" href="data:application/manifest+json,{
  %22name%22:%222048%22,
  %22short_name%22:%222048%22,
  %22description%22:%22Slide tiles and reach 2048!%22,
  %22start_url%22:%22.%22,
  %22display%22:%22standalone%22,
  %22background_color%22:%22%231a1a2e%22,
  %22theme_color%22:%22%231a1a2e%22,
  %22orientation%22:%22portrait%22,
  %22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%231a1a2e'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='200' fill='%23e94560'>2048</text></svg>%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22}]
}">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a1a2e;
    --surface:   #16213e;
    --accent:    #e94560;
    --accent2:   #f5a623;
    --text:      #eaeaea;
    --text-dim:  #8899aa;
    --grid-bg:   #0d2137;
    --cell-empty:#0a1c2e;
    --gap:       14px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100dvh;
    padding: 14px 14px 14px;
    padding-top: max(14px, env(safe-area-inset-top));
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(233,69,96,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
    height: 100%;
    max-width: 560px;
    padding-top: 18px; /* ← biraz aşağı */
  }

  /* ── Header ── */
  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .logo {
    font-size: clamp(3.2rem, 10vw, 4.8rem);   /* ← büyütüldü */
    font-weight: 900;
    letter-spacing: -3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .scores { display: flex; gap: 10px; }

  .score-box {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 12px 22px;   /* ← büyütüldü */
    text-align: center;
    min-width: 88px;
  }

  .score-label {
    font-size: 0.68rem;   /* ← büyütüldü */
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .score-value {
    font-size: 1.6rem;    /* ← büyütüldü */
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  /* ── Controls ── */
  .controls {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .hint { font-size: 0.82rem; color: var(--text-dim); }
  .hint strong { color: var(--text); font-weight: 600; }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 26px;
    font-size: 0.88rem;   /* ← büyütüldü */
    font-weight: 700;
    letter-spacing: 0.4px;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: inherit;
  }
  .btn:hover  { background: #d63651; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  /* ── Grid ── */
  .grid-wrap {
    position: relative;
    width: 100%;
    flex: 1 1 auto;
    min-height: 0;
  }

  .grid-inner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .grid-square {
    position: relative;
    width: min(100%, 100%);
    aspect-ratio: 1 / 1;
    max-height: 100%;
  }

  .grid-bg {
    width: 100%; height: 100%;
    background: var(--grid-bg);
    border-radius: 18px;
    padding: var(--gap);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--gap);
    border: 1px solid rgba(255,255,255,0.04);
    box-shadow: 0 24px 70px rgba(0,0,0,0.45),
                inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .cell-bg {
    background: var(--cell-empty);
    border-radius: 10px;
    aspect-ratio: 1;
  }

  .tiles-layer {
    position: absolute;
    inset: var(--gap);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--gap);
    pointer-events: none;
  }

  .tile-slot { position: relative; }

  .tile {
    position: absolute; inset: 0;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    font-size: clamp(1.1rem, 4vw, 2rem);
    letter-spacing: -0.5px;
    transition: transform 0.1s ease;
  }

  .tile.new-tile    { animation: popIn 0.15s ease-out; }
  .tile.merged-tile { animation: pop   0.2s  ease-out; }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes pop {
    0%   { transform: scale(1);    }
    50%  { transform: scale(1.13); }
    100% { transform: scale(1);    }
  }

  /* Tile colours */
  .t2    { background:#1e3a5f; color:#b0c8e8; }
  .t4    { background:#1a4a6e; color:#90d4f0; }
  .t8    { background:#0e6b8a; color:#d0f0ff; }
  .t16   { background:#0a7a7a; color:#c0ffe0; }
  .t32   { background:#1a7a50; color:#c0ffd0; }
  .t64   { background:#2d8a30; color:#d0ffc0; }
  .t128  { background:#a06020; color:#ffe0b0; font-size:clamp(0.85rem,3vw,1.5rem); }
  .t256  { background:#b04818; color:#ffc0a0; font-size:clamp(0.85rem,3vw,1.5rem); }
  .t512  { background:#c03020; color:#ffb0a0; font-size:clamp(0.85rem,3vw,1.5rem); }
  .t1024 { background:#9020b0; color:#f0b0ff; font-size:clamp(0.7rem,2.5vw,1.2rem); }
  .t2048 { background:linear-gradient(135deg,#e94560,#f5a623); color:#fff; font-size:clamp(0.7rem,2.5vw,1.2rem); box-shadow:0 0 30px rgba(233,69,96,.5); }
  .t4096 { background:linear-gradient(135deg,#f5a623,#ffdd57); color:#fff; font-size:clamp(0.6rem,2.2vw,1rem);   box-shadow:0 0 30px rgba(245,166,35,.6); }

  /* Overlay */
  .overlay {
    display: none;
    position: absolute; inset: 0;
    background: rgba(13,33,55,0.92);
    border-radius: 18px;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    backdrop-filter: blur(6px);
    z-index: 10;
  }
  .overlay.show { display: flex; }

  .overlay-title { font-size:clamp(1.8rem,6vw,2.8rem); font-weight:900; letter-spacing:-1px; }
  .overlay-sub   { font-size:0.88rem; color:var(--text-dim); text-align:center; padding:0 24px; }
  .overlay-score { font-size:1rem; color:var(--text-dim); }
  .overlay-score span { color:var(--accent2); font-weight:700; }

  /* Score pop */
  .score-pop {
    position: fixed;
    font-size: 1.05rem; font-weight: 800;
    color: var(--accent2);
    pointer-events: none; z-index: 999;
    animation: floatUp 0.8s ease-out forwards;
  }
  @keyframes floatUp {
    from { opacity:1; transform:translateY(0); }
    to   { opacity:0; transform:translateY(-50px); }
  }

  @media (prefers-reduced-motion: reduce) {
    .tile, .tile.new-tile, .tile.merged-tile { animation: none; transition: none; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="logo">2048</div>
    <div class="scores">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Best</div>
        <div class="score-value" id="best">0</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="hint">Use <strong>arrow keys</strong> or <strong>swipe</strong> to play</div>
    <button class="btn" id="newGame">New Game</button>
  </div>

  <div class="grid-wrap">
    <div class="grid-inner">
      <div class="grid-square">
        <div class="grid-bg" id="grid-bg"></div>
        <div class="tiles-layer" id="tiles-layer"></div>
        <div class="overlay" id="overlay">
          <div class="overlay-title" id="overlay-title">Game Over</div>
          <div class="overlay-sub"   id="overlay-sub">No more moves available.</div>
          <div class="overlay-score">Score: <span id="overlay-score">0</span></div>
          <button class="btn" id="overlay-btn">Play Again</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Game logic ──────────────────────────────────────────────
const SIZE = 4;
let board = [], score = 0, best = 0, won = false, over = false;

const scoreEl    = document.getElementById('score');
const bestEl     = document.getElementById('best');
const gridBg     = document.getElementById('grid-bg');
const tilesLayer = document.getElementById('tiles-layer');
const overlay    = document.getElementById('overlay');
const oTitle     = document.getElementById('overlay-title');
const oSub       = document.getElementById('overlay-sub');
const oScore     = document.getElementById('overlay-score');

for (let i = 0; i < SIZE * SIZE; i++) {
  gridBg.innerHTML     += '<div class="cell-bg"></div>';
  tilesLayer.innerHTML += '<div class="tile-slot"></div>';
}

const slots = () => tilesLayer.querySelectorAll('.tile-slot');

function newBoard() {
  board = Array.from({length:SIZE}, () => Array(SIZE).fill(0));
  score = 0; won = false; over = false;
  overlay.classList.remove('show');
  addRandom(); addRandom();
  render();
}

function addRandom() {
  const empties = [];
  board.forEach((row,r) => row.forEach((v,c) => { if (!v) empties.push([r,c]); }));
  if (!empties.length) return false;
  const [r,c] = empties[Math.floor(Math.random() * empties.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
  return [r,c];
}

function render(newCell, mergedCells) {
  const sl = slots();
  board.forEach((row,r) => row.forEach((v,c) => {
    const slot = sl[r*SIZE+c];
    slot.innerHTML = '';
    if (!v) return;
    const t = document.createElement('div');
    t.className = 'tile t' + (v > 4096 ? 4096 : v);
    t.textContent = v;
    if (newCell && newCell[0]===r && newCell[1]===c) t.classList.add('new-tile');
    if (mergedCells) mergedCells.forEach(([mr,mc]) => {
      if (mr===r && mc===c) t.classList.add('merged-tile');
    });
    slot.appendChild(t);
  }));
  scoreEl.textContent = score;
  if (score > best) {
    best = score;
    bestEl.textContent = best;
    localStorage.setItem('2048best', best);
  }
}

function addScore(val, el) {
  score += val;
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = '+' + val;
  const r = el.getBoundingClientRect();
  pop.style.left = (r.left + r.width/2 - 20) + 'px';
  pop.style.top  = (r.top - 10) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 900);
}

function slideRow(row) {
  let arr = row.filter(v => v);
  const mergedIdx = [];
  for (let i = 0; i < arr.length-1; i++) {
    if (arr[i] === arr[i+1]) {
      arr[i] *= 2;
      arr.splice(i+1,1);
      mergedIdx.push(i);
    }
  }
  while (arr.length < SIZE) arr.push(0);
  return { arr, mergedIdx };
}

function move(dir) {
  if (over) return;
  let moved = false;
  const mergedCells = [];

  function slideAndApply(getRow, setCell) {
    for (let i = 0; i < SIZE; i++) {
      const { arr, mergedIdx } = slideRow(getRow(i));
      arr.forEach((v,j) => {
        const [r,c] = setCell(i,j);
        if (board[r][c] !== v) moved = true;
        if (mergedIdx.includes(j) && v) {
          mergedCells.push([r,c]);
          addScore(v, slots()[r*SIZE+c]);
        }
        board[r][c] = v;
      });
    }
  }

  const rev = i => [...board[i]].reverse();
  const col = i => board.map(r => r[i]);
  const colR= i => board.map(r => r[i]).reverse();

  if (dir==='left')  slideAndApply(i => board[i],  (i,j) => [i, j]);
  if (dir==='right') slideAndApply(rev,             (i,j) => [i, SIZE-1-j]);
  if (dir==='up')    slideAndApply(col,             (i,j) => [j, i]);
  if (dir==='down')  slideAndApply(colR,            (i,j) => [SIZE-1-j, i]);

  if (!moved) return;
  const nc = addRandom();
  render(nc, mergedCells);

  if (!won && board.some(row => row.some(v => v===2048))) {
    won = true;
    setTimeout(() => showOverlay('You Win! 🎉','You reached 2048! Keep going for more.',false), 300);
  }
  if (!canMove()) {
    over = true;
    setTimeout(() => showOverlay('Game Over','No more moves available.',true), 400);
  }
}

function canMove() {
  for (let r=0; r<SIZE; r++)
    for (let c=0; c<SIZE; c++) {
      if (!board[r][c]) return true;
      if (c<SIZE-1 && board[r][c]===board[r][c+1]) return true;
      if (r<SIZE-1 && board[r][c]===board[r+1][c]) return true;
    }
  return false;
}

function showOverlay(title, sub, isOver) {
  oTitle.textContent = title;
  oSub.textContent   = sub;
  oScore.textContent = score;
  oTitle.style.color = isOver ? '#e94560' : '#f5a623';
  overlay.classList.add('show');
  if (isOver) over = true;
}

// ── Input ───────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const map = {
    ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
    a:'left', d:'right', w:'up', s:'down'
  };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

let tx, ty;
document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, { passive:true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx)<10 && Math.abs(dy)<10) return;
  if (Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else                            move(dy>0?'down':'up');
}, { passive:true });

document.getElementById('newGame').addEventListener('click', newBoard);
document.getElementById('overlay-btn').addEventListener('click', newBoard);

// ── Init ────────────────────────────────────────────────────
best = parseInt(localStorage.getItem('2048best')||'0');
bestEl.textContent = best;
newBoard();

// ── Service Worker (offline support) ────────────────────────
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = '2048-v1';
    const FILES = [location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(FILES)));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request))
      );
    });
  `;
  const blob = new Blob([sw], { type:'application/javascript' });
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
}
</script>
</body>
</html>
