<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  min-height:100%;height:100dvh;
  background:#12071f;
  background-image:radial-gradient(ellipse 70% 60% at 50% 55%,#2a0f4a 0%,#12071f 100%);
  color:#f0e8ff;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  overflow:hidden;touch-action:none;
  user-select:none;-webkit-user-select:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding-bottom:5vh;
}
#game{
  display:flex;flex-direction:column;align-items:stretch;
  width:min(96vw,96vh,520px);gap:10px;position:relative;
}
#header{display:flex;align-items:center;justify-content:space-between}
#logo{
  font-size:clamp(2.6rem,11vw,4rem);font-weight:900;letter-spacing:-3px;
  background:linear-gradient(135deg,#e879f9,#a855f7,#6366f1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.1;padding-right:6px;
}

/* Name screen */
#name-screen{
  position:fixed;inset:0;z-index:200;
  background:#12071f;
  background-image:radial-gradient(ellipse 70% 60% at 50% 55%,#2a0f4a 0%,#12071f 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
}
#name-screen h1{
  font-size:clamp(3rem,14vw,5rem);font-weight:900;letter-spacing:-3px;
  background:linear-gradient(135deg,#e879f9,#a855f7,#6366f1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.1;
}
#name-screen p{font-size:1rem;color:#8b6aaa;letter-spacing:.5px}
#name-input{
  background:#1e1035;border:2px solid #2e1854;color:#f0e8ff;
  font-size:1.2rem;font-weight:700;text-align:center;
  padding:14px 24px;border-radius:12px;outline:none;
  width:min(80vw,280px);
  transition:border-color .2s;
}
#name-input::placeholder{color:#4a3068}
#name-input:focus{border-color:#a855f7;box-shadow:0 0 20px #a855f733}
#name-start{
  background:linear-gradient(135deg,#a855f7,#6366f1);border:none;color:#fff;
  font-size:.95rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  padding:14px 40px;border-radius:12px;cursor:pointer;
  box-shadow:0 0 24px #a855f766;transition:filter .15s;
}
#name-start:hover{filter:brightness(1.15)}
#name-start:active{transform:scale(.96)}

/* Player badge above logo */
#logo-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:0}
#player-badge{
  font-size:.7rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:#a855f7;opacity:.9;line-height:1;margin-bottom:2px;
}
#scores{display:flex;gap:8px}
.sbox{
  background:#1e1035;border:1px solid #2e1854;border-radius:10px;
  padding:10px 20px;text-align:center;min-width:90px;position:relative;overflow:visible;
}
.slbl{font-size:.78rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8b6aaa}
.sval{font-size:clamp(1.45rem,5vw,2rem);font-weight:900;color:#f0e8ff;line-height:1.1}
#controls{display:flex;justify-content:flex-end;gap:8px}
button{
  background:#1e1035;border:1px solid #2e1854;color:#8b6aaa;
  font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:8px 16px;border-radius:8px;cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;
}
button:hover{background:#2e1854;color:#f0e8ff;border-color:#a855f7}
button:active{transform:scale(.96)}

/* Board */
#board{
  background:#0e0520;border-radius:14px;padding:10px;
  aspect-ratio:1;position:relative;
  border:2px solid #2a0f4a;
  box-shadow:0 0 60px #6d28d944,inset 0 0 30px #0007;
}
#bg-layer{
  position:absolute;inset:10px;
  display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:10px;
}
.cbg{background:#1a0d2e;border-radius:8px}

/* Tile layer — SAME inset as bg-layer */
#tile-layer{position:absolute;inset:10px;overflow:visible}

/* Tiles */
.tile{
  position:absolute;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;font-weight:900;line-height:1;
  transition:left .15s cubic-bezier(.4,0,.2,1),top .15s cubic-bezier(.4,0,.2,1);
  will-change:left,top;z-index:2;
}
.tile.appear{animation:tapear .18s cubic-bezier(.34,1.56,.64,1) both}
.tile.pop{animation:tpop .2s cubic-bezier(.34,1.56,.64,1) both;z-index:3}
@keyframes tapear{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes tpop{0%{transform:scale(1)}50%{transform:scale(1.22)}100%{transform:scale(1)}}

/* Colours */
.v2   {background:linear-gradient(135deg,#3b1f5e,#4c2875);color:#c9a8ff}
.v4   {background:linear-gradient(135deg,#2d1a6e,#4338ca);color:#c7d2fe}
.v8   {background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#bfdbfe}
.v16  {background:linear-gradient(135deg,#0e7490,#06b6d4);color:#cffafe}
.v32  {background:linear-gradient(135deg,#065f46,#10b981);color:#d1fae5}
.v64  {background:linear-gradient(135deg,#365314,#84cc16);color:#ecfccb}
.v128 {background:linear-gradient(135deg,#713f12,#f59e0b);color:#fff7ed;box-shadow:0 0 14px #f59e0b44}
.v256 {background:linear-gradient(135deg,#7c2d12,#f97316);color:#fff7ed;box-shadow:0 0 16px #f9731644}
.v512 {background:linear-gradient(135deg,#7f1d1d,#ef4444);color:#fff;box-shadow:0 0 18px #ef444444}
.v1024{background:linear-gradient(135deg,#831843,#ec4899);color:#fff;box-shadow:0 0 22px #ec489955}
.v2048{background:linear-gradient(135deg,#4c1d95,#a855f7,#e879f9);color:#fff;box-shadow:0 0 32px #a855f766;animation:glow 1.4s ease-in-out infinite alternate}
.vmax {background:linear-gradient(135deg,#f0abfc,#e879f9,#a855f7);color:#fff;box-shadow:0 0 40px #a855f7aa}
@keyframes glow{from{box-shadow:0 0 24px #a855f766}to{box-shadow:0 0 48px #e879f9aa}}

/* Overlay */
#overlay{
  position:absolute;inset:0;background:rgba(8,3,18,.88);
  backdrop-filter:blur(6px);border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  opacity:0;pointer-events:none;transition:opacity .28s;z-index:20;
}
#overlay.show{opacity:1;pointer-events:all}
#ov-title{
  font-size:clamp(2.2rem,10vw,3.2rem);font-weight:900;
  background:linear-gradient(135deg,#e879f9,#a855f7,#6366f1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#ov-sub{font-size:.95rem;color:#8b6aaa}
#overlay button{
  background:linear-gradient(135deg,#a855f7,#6366f1);border:none;color:#fff;
  font-size:.88rem;padding:12px 32px;border-radius:10px;
  font-weight:800;letter-spacing:1.5px;box-shadow:0 0 24px #a855f766;
}
#overlay button:hover{filter:brightness(1.15)}

/* Score delta */
.delta{
  position:absolute;top:-4px;right:4px;
  font-size:.9rem;font-weight:800;color:#e879f9;
  pointer-events:none;white-space:nowrap;
  animation:rise .8s ease forwards;
}
@keyframes rise{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-34px)}}
</style>
</head>
<body>
<div id="name-screen">
  <h1>2048</h1>
  <p>Enter your name to start playing!</p>
  <input id="name-input" type="text" placeholder="Your name..." maxlength="20" autocomplete="off"/>
  <button id="name-start">Play ▶</button>
</div>
<div id="game">
  <div id="header">
    <div id="logo-wrap">
      <div id="player-badge">👤 <span id="player-name"></span></div>
      <div id="logo">2048</div>
    </div>
    <div id="scores">
      <div class="sbox" id="score-box">
        <div class="slbl">Score</div>
        <div class="sval" id="score-el">0</div>
      </div>
      <div class="sbox">
        <div class="slbl">Best</div>
        <div class="sval" id="best-el">0</div>
      </div>
    </div>
  </div>
  <div id="controls">
    <button id="btn-undo">↩ Undo</button>
    <button id="btn-new">New Game</button>
  </div>
  <div id="board">
    <div id="bg-layer"></div>
    <div id="tile-layer"></div>
    <div id="overlay">
      <div id="ov-title">Game Over</div>
      <div id="ov-sub">No moves left</div>
      <button id="btn-retry">Try Again</button>
    </div>
  </div>
</div>
<canvas id="confetti-canvas" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:100;display:none"></canvas>

<script>
'use strict';
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const N        = 4;
const GAP      = 10;   // px between cells
const PAD      = 10;   // board padding
const SLIDE_MS = 150;  // animation duration (must match CSS)

// ═══════════════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════════════
const tileLayer = document.getElementById('tile-layer');
const bgLayer   = document.getElementById('bg-layer');
const overlay   = document.getElementById('overlay');
const ovTitle   = document.getElementById('ov-title');
const ovSub     = document.getElementById('ov-sub');
const scoreEl   = document.getElementById('score-el');
const bestEl    = document.getElementById('best-el');
const scoreBox  = document.getElementById('score-box');

// Build background cells
for (let i = 0; i < N*N; i++) {
  const d = document.createElement('div');
  d.className = 'cbg';
  bgLayer.appendChild(d);
}

// ═══════════════════════════════════════════════════════
//  GEOMETRY
//  tile-layer has inset:10px, so its clientWidth already
//  excludes the board padding on both sides.
// ═══════════════════════════════════════════════════════
function cellRect(r, c) {
  const W  = tileLayer.clientWidth;
  const H  = tileLayer.clientHeight;
  const cw = (W - GAP*(N-1)) / N;
  const ch = (H - GAP*(N-1)) / N;
  return { left: c*(cw+GAP), top: r*(ch+GAP), w: cw, h: ch };
}

// ═══════════════════════════════════════════════════════
//  TILE CLASS
// ═══════════════════════════════════════════════════════
let _uid = 0;
class Tile {
  constructor(value, r, c) {
    this.id     = _uid++;
    this.value  = value;
    this.r      = r;
    this.c      = c;
    this.merged = false;   // consumed in this move?

    this.el = document.createElement('div');
    tileLayer.appendChild(this.el);
    this._sync();
    this._place(r, c, /*instant*/true);
  }

  // Update classes + text to match this.value
  _sync() {
    const cls = this.value <= 2048 ? 'v' + this.value : 'vmax';
    this.el.className = 'tile ' + cls;
    this.el.style.fontSize = this._fontSize();
    this.el.textContent = this.value;
  }

  _fontSize() {
    const l = String(this.value).length;
    if (l <= 2) return 'clamp(1.7rem,7vw,2.4rem)';
    if (l === 3) return 'clamp(1.25rem,5.2vw,1.85rem)';
    if (l === 4) return 'clamp(.95rem,4vw,1.45rem)';
    return 'clamp(.75rem,3.2vw,1.1rem)';
  }

  // Move tile element to cell (r,c) — animated unless instant=true
  _place(r, c, instant) {
    if (instant) {
      this.el.style.transition = 'none';
      // force style flush then restore transition
      void this.el.offsetLeft;
    }
    const rect = cellRect(r, c);
    this.el.style.left   = rect.left + 'px';
    this.el.style.top    = rect.top  + 'px';
    this.el.style.width  = rect.w    + 'px';
    this.el.style.height = rect.h    + 'px';
    if (instant) {
      // re-enable after paint
      requestAnimationFrame(() => { this.el.style.transition = ''; });
    }
    this.r = r;
    this.c = c;
  }

  slideTo(r, c) { this._place(r, c, false); }

  appear() {
    this.el.classList.add('appear');
    this.el.addEventListener('animationend', () => this.el.classList.remove('appear'), {once:true});
  }

  popMerge() {
    this.el.classList.remove('pop');
    void this.el.offsetLeft; // reflow to restart
    this.el.classList.add('pop');
    this.el.addEventListener('animationend', () => this.el.classList.remove('pop'), {once:true});
  }

  destroy() { this.el.remove(); }

  reposition() { this._place(this.r, this.c, true); }
}

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
// grid[r][c] = Tile | null
let grid, score, best, busy, won;
let undoGrid = null, undoScore = 0;

function emptyGrid() {
  return Array.from({length:N}, () => Array(N).fill(null));
}

function newGame() {
  // remove all tile DOM nodes
  tileLayer.innerHTML = '';
  grid  = emptyGrid();
  score = 0;
  best  = parseInt(localStorage.getItem('2048_best') || '0');
  busy  = false;
  won   = false;
  undoGrid = null;
  overlay.classList.remove('show');
  spawnTile(true);
  spawnTile(true);
  renderScore(0);
}

function spawnTile(instant) {
  const empty = [];
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (!grid[r][c]) empty.push([r,c]);
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  const t = new Tile(Math.random()<.9?2:4, r, c);
  grid[r][c] = t;
  if (!instant) t.appear();
}

// ═══════════════════════════════════════════════════════
//  MOVE  (the heart of the game — no DOM clearing)
// ═══════════════════════════════════════════════════════
function move(dir) {
  if (busy) return;

  // Save undo state (value snapshot only)
  const snapGrid  = grid.map(row => row.map(t => t ? {value:t.value,r:t.r,c:t.c} : null));
  const snapScore = score;

  // Determine iteration order for each axis so we process in slide direction
  // dir: 0=left 1=up 2=right 3=down
  const rowRange = range(N, dir === 3);  // reverse rows for "down"
  const colRange = range(N, dir === 2);  // reverse cols for "right"

  // Reset merged flags
  forEachTile(t => { t.merged = false; });

  let anyMoved = false;
  // merges: array of {winner:Tile, loser:Tile}
  const merges = [];

  for (const r of rowRange) {
    for (const c of colRange) {
      const tile = grid[r][c];
      if (!tile) continue;

      // Walk tile in slide direction as far as possible
      let cr = r, cc = c;
      while (true) {
        const nr = cr + DR[dir];
        const nc = cc + DC[dir];
        if (nr < 0 || nr >= N || nc < 0 || nc >= N) break; // wall

        const neighbor = grid[nr][nc];

        if (!neighbor) {
          // Empty cell — slide into it
          grid[cr][cc] = null;
          grid[nr][nc] = tile;
          cr = nr; cc = nc;
          anyMoved = true;
        } else if (!neighbor.merged && neighbor.value === tile.value) {
          // Merge!
          grid[cr][cc] = null;
          // loser (neighbor) stays in its cell logically but will slide to meet winner
          // winner (tile) moves to neighbor's cell
          grid[nr][nc] = tile;   // winner occupies the cell
          tile.merged   = true;
          neighbor.merged = true;
          cr = nr; cc = nc;
          anyMoved = true;
          // Loser slides to same destination
          merges.push({winner: tile, loser: neighbor, destR: nr, destC: nc});
          break;
        } else {
          break; // blocked
        }
      }

      // Animate tile to final position (CSS handles smoothness)
      if (cr !== r || cc !== c) {
        tile.slideTo(cr, cc);
      }
    }
  }

  if (!anyMoved) return;

  // Save undo snapshot
  undoGrid  = snapGrid;
  undoScore = snapScore;

  // Also animate losers sliding into their merge destinations
  for (const {loser, destR, destC} of merges) {
    loser.slideTo(destR, destC);
  }

  busy = true;

  // After animation: finalise merges, spawn, check end
  setTimeout(() => {
    let delta = 0;

    for (const {winner, loser} of merges) {
      // Update winner value
      winner.value *= 2;
      winner._sync();
      winner.popMerge();
      // Remove loser DOM node
      loser.destroy();
      delta += winner.value;
      // 🎉 Confetti when 1024+1024 → 2048
      if (winner.value === 2048) {
        launchConfetti();
      }
    }

    score += delta;
    if (score > best) {
      best = score;
      localStorage.setItem('2048_best', best);
    }
    renderScore(delta);

    // Reset merged flags
    forEachTile(t => { t.merged = false; });

    // Spawn new tile
    spawnTile(false);

    // Check win
    if (!won) forEachTile(t => { if (t.value >= 2048) won = true; });

    const over = !hasMoves();
    busy = false;

    if (over) {
      setTimeout(() => {
        ovTitle.textContent = won ? '🎉 You Win!' : 'Game Over';
        ovSub.textContent   = over && !won ? 'No moves left' : 'Score: ' + score;
        overlay.classList.add('show');
      }, 200);
    }
  }, SLIDE_MS + 30);
}

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
const DR = [0,-1,0,1];  // row delta per direction
const DC = [-1,0,1,0];  // col delta per direction

function range(n, reverse) {
  const a = Array.from({length:n},(_,i)=>i);
  return reverse ? a.reverse() : a;
}

function forEachTile(fn) {
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (grid[r][c]) fn(grid[r][c]);
}

function hasMoves() {
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      if (!grid[r][c]) return true;
      const v = grid[r][c].value;
      if (c<N-1 && grid[r][c+1] && grid[r][c+1].value === v) return true;
      if (r<N-1 && grid[r+1][c] && grid[r+1][c].value === v) return true;
    }
  return false;
}

function renderScore(delta) {
  scoreEl.textContent = score;
  bestEl.textContent  = best;
  if (delta > 0) {
    const p = document.createElement('div');
    p.className = 'delta';
    p.textContent = '+' + delta;
    scoreBox.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// ═══════════════════════════════════════════════════════
//  UNDO
// ═══════════════════════════════════════════════════════
function undoMove() {
  if (!undoGrid || busy) return;
  tileLayer.innerHTML = '';
  grid = emptyGrid();
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      const s = undoGrid[r][c];
      if (!s) continue;
      const t = new Tile(s.value, r, c);
      grid[r][c] = t;
    }
  score    = undoScore;
  undoGrid = null;
  overlay.classList.remove('show');
  renderScore(0);
}

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const map = {ArrowLeft:0,ArrowUp:1,ArrowRight:2,ArrowDown:3,
               a:0,A:0,w:1,W:1,d:2,D:2,s:3,S:3};
  if (map[e.key] !== undefined) { e.preventDefault(); move(map[e.key]); }
});

let _tx, _ty;
document.addEventListener('touchstart', e => {
  _tx = e.touches[0].clientX; _ty = e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _tx;
  const dy = e.changedTouches[0].clientY - _ty;
  if (Math.max(Math.abs(dx),Math.abs(dy)) < 24) return;
  move(Math.abs(dx) > Math.abs(dy) ? (dx<0?0:2) : (dy<0?1:3));
});

document.getElementById('btn-new').addEventListener('click', () => {
  nameScreen.style.display = 'flex';
  nameScreen.style.opacity = '1';
  nameInput.value = '';
  nameInput.focus();
});
document.getElementById('btn-retry').addEventListener('click', newGame);
document.getElementById('btn-undo').addEventListener('click', undoMove);

window.addEventListener('resize', () => { forEachTile(t => t.reposition()); });

// ═══════════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════════
const confettiCanvas = document.getElementById('confetti-canvas');
const ctx = confettiCanvas.getContext('2d');
let confettiParticles = [];
let confettiRAF = null;

function launchConfetti() {
  confettiCanvas.width  = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
  confettiCanvas.style.display = 'block';

  const colors = ['#e879f9','#a855f7','#6366f1','#ec4899','#f59e0b','#10b981','#06b6d4','#fff'];
  confettiParticles = [];

  for (let i = 0; i < 180; i++) {
    confettiParticles.push({
      x: Math.random() * confettiCanvas.width,
      y: Math.random() * -confettiCanvas.height * .5,
      w: 8 + Math.random() * 8,
      h: 5 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - .5) * .18,
      vx: (Math.random() - .5) * 4,
      vy: 2.5 + Math.random() * 4,
      alpha: 1,
    });
  }

  if (confettiRAF) cancelAnimationFrame(confettiRAF);
  let elapsed = 0;
  function tick() {
    elapsed++;
    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    let alive = 0;
    for (const p of confettiParticles) {
      p.x   += p.vx;
      p.y   += p.vy;
      p.rot += p.rotSpeed;
      p.vy  += .07; // gravity
      if (elapsed > 90) p.alpha -= .012;
      if (p.alpha <= 0) continue;
      alive++;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    if (alive > 0) {
      confettiRAF = requestAnimationFrame(tick);
    } else {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      confettiCanvas.style.display = 'none';
      confettiRAF = null;
    }
  }
  confettiRAF = requestAnimationFrame(tick);
}

window.addEventListener('resize', () => {
  if (confettiCanvas.style.display !== 'none') {
    confettiCanvas.width  = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
  }
});
// ═══════════════════════════════════════════════════════
//  NAME SCREEN
// ═══════════════════════════════════════════════════════
const nameScreen = document.getElementById('name-screen');
const nameInput  = document.getElementById('name-input');
const nameStart  = document.getElementById('name-start');
const playerName = document.getElementById('player-name');

let currentPlayer = localStorage.getItem('2048_player') || '';

function startWithName() {
  const n = nameInput.value.trim();
  if (!n) { nameInput.focus(); return; }
  currentPlayer = n;
  localStorage.setItem('2048_player', n);
  playerName.textContent = n;
  nameScreen.style.transition = 'opacity .35s';
  nameScreen.style.opacity = '0';
  setTimeout(() => { nameScreen.style.display = 'none'; }, 360);
  newGame();
}

nameStart.addEventListener('click', startWithName);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') startWithName(); });

// Always ask for name on every new game
nameInput.value = '';
nameInput.focus();


</script>
</body>
</html>
